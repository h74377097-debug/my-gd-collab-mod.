# .github/workflows/build.yml
# Автоматическая компиляция мода БЕЗ установки локальных программ (CMake, VS Code, C++)
# Просто залейте файлы на ваш GitHub репозиторий, и GitHub Actions сам соберет готовый .geode файл!

name: Build Geode Mod

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
        - name: Windows
          os: windows-latest
          target: Win64
        - name: macOS
          os: macos-latest
          target: Mac
        - name: Android
          os: ubuntu-latest
          target: Android

    name: Build (${{ matrix.config.name }})
    runs-on: ${{ matrix.config.os }}

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Build Mod
      uses: geode-sdk/build-geode-mod@main
      with:
        target: ${{ matrix.config.target }}
        cli: v3.7.0
